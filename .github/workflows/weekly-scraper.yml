name: Weekly Tennis Abstract Scraper

on:
  schedule:
    # Every Monday at 06:00 UTC (after weekend results are posted)
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape-profiles:
    name: Scrape All Player Profiles
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Tennis Abstract scraper (all players from player_profiles)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scraper
          python tourly_scraper.py
